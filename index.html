<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayView — Rental Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/shared.css">
<link rel="stylesheet" href="/css/dashboard.css">
</head>
<body>

<header>
  <div class="logo">StayView <span>Rental Dashboard</span></div>
  <div class="header-right">
    <span id="last-updated"></span>
    <div class="mode-toggle">
      <button class="mode-btn" id="btn-live" onclick="setMode('live')">Live</button>
      <button class="mode-btn active" id="btn-demo" onclick="setMode('demo')">Demo</button>
    </div>
    <!-- Book Direct button — enabled when booking engine is released -->
    <button class="refresh-btn" id="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
</header>

<main>
  <div class="stat-grid">
    <div class="stat-card"><div class="stat-label">Total Bookings</div><div class="stat-value" id="s-total">—</div><div class="stat-sub">across all platforms</div></div>
    <div class="stat-card"><div class="stat-label">Active Now</div><div class="stat-value" id="s-active" style="color:var(--green)">—</div><div class="stat-sub">guests checked in</div></div>
    <div class="stat-card"><div class="stat-label">Upcoming (30d)</div><div class="stat-value" id="s-upcoming" style="color:var(--accent)">—</div><div class="stat-sub">next 30 days</div></div>
    <div class="stat-card"><div class="stat-label">Occupancy (30d)</div><div class="stat-value" id="s-occ" style="color:var(--blue)">—</div><div class="stat-sub" id="s-occ-sub">—</div></div>
  </div>

  <div id="error-area"></div>

  <div class="two-col">
    <div>
      <div class="section-row">
        <span class="section-title">Bookings</span>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
          <div class="filter-group" id="src-filters">
            <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
            <button class="filter-btn f-airbnb"     onclick="setFilter('airbnb',this)">Airbnb</button>
            <button class="filter-btn f-booking"    onclick="setFilter('booking',this)">Booking.com</button>
            <button class="filter-btn f-lekkeslaap" onclick="setFilter('lekkeslaap',this)">Lekkeslaap</button>
            <!-- Direct filter — enabled when booking engine is released -->
          </div>
          <div class="filter-group view-group">
            <button class="filter-btn active" onclick="setView('upcoming',this)">Upcoming</button>
            <button class="filter-btn"        onclick="setView('all',this)">All</button>
          </div>
        </div>
      </div>
      <div id="bookings-area"><div class="loading"><div class="spinner"></div>Fetching calendars…</div></div>
    </div>

    <div>
      <div class="section-row"><span class="section-title">Calendar</span></div>
      <div class="cal-card">
        <div class="cal-header">
          <span class="cal-title" id="cal-title">—</span>
          <div class="cal-nav">
            <button onclick="changeMonth(-1)">‹</button>
            <button onclick="changeMonth(1)">›</button>
          </div>
        </div>
        <div class="cal-grid" id="cal-grid">
          <div class="cal-dow">M</div><div class="cal-dow">T</div><div class="cal-dow">W</div>
          <div class="cal-dow">T</div><div class="cal-dow">F</div><div class="cal-dow">S</div><div class="cal-dow">S</div>
        </div>
        <div class="occ-section">
          <div class="occ-label">30-day occupancy</div>
          <div class="occ-track"><div class="occ-fill" id="occ-fill" style="width:0"></div></div>
          <div class="occ-text" id="occ-text">—</div>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:var(--airbnb)"></div>Airbnb</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--booking)"></div>Booking.com</div>
          <div class="legend-item"><div class="legend-dot" style="background:var(--lekkeslaap)"></div>Lekkeslaap</div>
          <!-- Direct legend — enabled when booking engine is released -->
          <div class="legend-item"><div class="legend-dot" style="background:var(--text3)"></div>Blocked</div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Delete modal — enabled when booking engine is released
<div class="modal-overlay" id="delete-modal" style="display:none" onclick="if(event.target===this)closeDeleteModal()">
  <div class="modal">
    <div class="modal-title">Delete booking?</div>
    <div class="modal-body" id="delete-modal-body"></div>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeDeleteModal()">Cancel</button>
      <button class="modal-delete" id="delete-confirm-btn" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>
-->

<script src="/js/shared.js"></script>
<script src="/js/dashboard.js"></script>
</body>
</html>
